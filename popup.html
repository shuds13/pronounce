<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    :root { color-scheme: dark; }
    body {
      width: 260px;
      margin: 0;
      padding: 14px;
      background: #1e1e2e;
      color: #eaeaea;
      font: 13px/1.45 system-ui, sans-serif;
    }
    h1 { margin: 0 0 6px; font-size: 15px; }
    p  { margin: 0 0 12px; color: #c8c8d4; }
    .row { display: flex; gap: 6px; }
    input {
      flex: 1;
      padding: 7px 9px;
      border: 1px solid #3a3a52;
      border-radius: 8px;
      background: #14141f;
      color: #eaeaea;
      font: inherit;
    }
    input:focus { outline: none; border-color: #7aa2f7; }
    button {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 48px;
      border: none;
      border-radius: 8px;
      background: #7aa2f7;
      cursor: pointer;
    }
    button:hover { background: #93b4ff; }
    button svg { width: 26px; height: 26px; display: block; }
  </style>
</head>
<body>
  <h1>Pronounce</h1>
  <p>Select a word or name on any page, right-click, and choose
     <b>Pronounce&nbsp;"…"</b> to hear it.</p>
  <div class="row">
    <input id="q" placeholder="…or type a word or name" autocomplete="off" />
    <button id="say" title="Play">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path d="M4 9h3.3l4.7-4v14l-4.7-4H4z" fill="#14141f" />
        <path d="M15 8.4a4.6 4.6 0 0 1 0 7.2" fill="none" stroke="#14141f"
              stroke-width="1.9" stroke-linecap="round" />
        <path d="M17.8 5.8a8.2 8.2 0 0 1 0 12.4" fill="none" stroke="#14141f"
              stroke-width="1.9" stroke-linecap="round" />
      </svg>
    </button>
  </div>
  <script src="popup.js"></script>
</body>
</html>
